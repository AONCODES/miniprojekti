- name: update/upgrade
  become: true
  ansible.builtin.apt:
    upgrade: yes
    update_cache: yes
    cache_valid_time: 86400

- name: install ufw
  become: true 
  ansible.builtin.apt:
    name:
      - ufw
      - nginx
    state: present

- name: allow port 22 for ssh
  become: true
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: enable ufw
  become: true
  community.general.ufw:
    state: enabled

- name: create user, add to sudo
  become: true
  ansible.builtin.user:
    name: richard
    password: "{{'1234' | password_hash('sha512') }}"
    update_password: on_create
    groups: sudo
    append: true

- name: lock root
  become: true
  ansible.builtin.user:
    name: root
    password_lock: yes

- name: allow port 80 for http
  become: true
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: create user
  user:
    name: "{{ item }}"
    state: present
  loop: 
    - user1
    - user2
    - user3
    - user4
